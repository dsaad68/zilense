<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MyDict — Chinese Dictionary Side Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@400;500;700;900&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5.0/dist/hanzi-writer.min.js"></script>
<style>
  :root {
    --font-han: "Noto Sans SC", sans-serif;
    --font-en: "Source Serif 4", Georgia, "Times New Roman", serif;
    --font-ui: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--font-en);
    background:
      radial-gradient(120% 120% at 50% 0%, #e9ddc7 0%, #d9c9ad 55%, #cbb894 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    color: #2a2520;
    -webkit-font-smoothing: antialiased;
  }
  [lang="zh"] { font-family: var(--font-han); }

  .stage { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .caption {
    font-family: var(--font-ui); font-size: 12.5px; letter-spacing: 0.02em;
    color: #6b5d44; text-align: center;
  }

  /* ----- split: article + dock ----- */
  .split { display: flex; height: 100%; background: #fff; }

  /* ----- the webpage (article) ----- */
  .page {
    flex: 1; height: 100%; overflow: auto; background: #fcfbf8;
    display: flex; flex-direction: column;
  }
  .page-bar {
    position: sticky; top: 0; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 20px; background: #fcfbf8ee; backdrop-filter: blur(6px);
    border-bottom: 1px solid #ece5d8; font-family: var(--font-ui);
  }
  .page-host { font-size: 12px; color: #a89e8c; letter-spacing: .02em; }
  .hint { font-size: 11.5px; color: #b25a4f; background: #f6e4df; padding: 4px 10px; border-radius: 999px; transition: background .15s, color .15s; }
  .hint.pinned { color: #fff; background: #c8443a; }
  .post { max-width: 560px; margin: 0 auto; padding: 40px 40px 80px; }
  .kicker { font-family: var(--font-ui); text-transform: uppercase; letter-spacing: .14em;
    font-size: 10.5px; font-weight: 600; color: #b25a4f; margin-bottom: 14px; }
  .post h1 { font-family: var(--font-han); font-weight: 900; font-size: 38px; line-height: 1.15;
    margin: 0 0 12px; color: #211d18; }
  .byline { font-family: var(--font-ui); font-size: 12.5px; color: #a89e8c; margin-bottom: 30px;
    padding-bottom: 22px; border-bottom: 1px solid #ece5d8; }
  .lead { font-size: 30px; line-height: 1.95; color: #2c2620; margin: 0 0 30px; font-weight: 500; }
  .punct { color: #b8ad99; }
  .tok {
    cursor: pointer; border-radius: 4px; padding: 0 1px;
    transition: background .12s, color .12s, box-shadow .12s;
    text-decoration: underline; text-decoration-color: transparent;
    text-underline-offset: 6px; text-decoration-thickness: 2px;
  }
  .tok.word { text-decoration-color: #e7d4a8; }
  .tok:hover { background: #f6e4df; color: #b23a2e; text-decoration-color: transparent; }
  .tok.active { background: #c8443a !important; color: #fff !important; text-decoration-color: transparent !important;
    box-shadow: 0 2px 0 rgba(178,58,46,.4); }
  .tok.pinned { position: relative; }
  .tok.pinned::after { content: ""; position: absolute; top: -3px; right: -2px; width: 7px; height: 7px;
    border-radius: 50%; background: #f0c419; border: 1.5px solid #fcfbf8; }
  .note { font-size: 15.5px; line-height: 1.65; color: #756a59; margin-top: 8px; }
  .inline-zh { color: #b23a2e; font-weight: 500; }

  /* ----- dock around the side panel ----- */
  .dock {
    width: 408px; flex-shrink: 0; height: 100%;
    border-left: 1px solid rgba(0,0,0,.12);
    display: flex; flex-direction: column;
    background: var(--bg);
  }
  .dock-head {
    height: 34px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px; font-family: var(--font-ui); font-size: 11px; letter-spacing: .04em;
    color: var(--ink3); background: var(--bg2); border-bottom: 1px solid var(--line);
  }
  .dock-dots { display: flex; gap: 5px; }
  .dock-dots i { width: 7px; height: 7px; border-radius: 50%; background: var(--line); }

  /* ================= PANEL THEME ================= */
  .panel[data-theme="light"] {
    --bg: #f5efe3; --bg2: #efe7d6; --card: #fbf7ee; --card2: #f1e9da;
    --ink: #2a2520; --ink2: #6b6258; --ink3: #9a9082; --line: #e3d9c6; --line2: #d8ccb5;
    --accent: #c8443a; --accent-ink: #fff; --accent-soft: rgba(200,68,58,.10);
    --t1:#a9781a; --t2:#3f7d4f; --t3:#2f6f8f; --t4:#c8443a; --t5:#9a8f7e;
  }
  .panel[data-theme="dark"] {
    --bg: #211e19; --bg2: #29251f; --card: #2c2822; --card2: #332e26;
    --ink: #ece3d2; --ink2: #b3a896; --ink3: #877d6d; --line: #393429; --line2: #453f33;
    --accent: #e0685c; --accent-ink: #211e19; --accent-soft: rgba(224,104,92,.15);
    --t1:#d8a93c; --t2:#74b886; --t3:#74b2d0; --t4:#e0685c; --t5:#a59a88;
  }
  .panel {
    height: 100%; overflow: hidden; background: var(--bg); color: var(--ink);
    display: flex; flex-direction: column; font-family: var(--font-ui);
    transition: background .2s, color .2s; position: relative;
  }
  .head-actions { display: flex; align-items: center; gap: 2px; }

  /* settings popover */
  .set-overlay { position: absolute; inset: 0; z-index: 30; }
  .settings-pop {
    position: absolute; top: 56px; right: 14px; z-index: 31; width: 268px;
    background: var(--card); border: 1px solid var(--line2); border-radius: 14px;
    box-shadow: 0 14px 40px rgba(0,0,0,.22), 0 0 0 1px rgba(0,0,0,.03);
    padding: 14px; display: flex; flex-direction: column; gap: 14px;
    opacity: 1; transform-origin: top right; animation: popin .16s ease-out;
  }
  @keyframes popin { from { transform: translateY(-6px) scale(.98); } to { transform: none; } }
  .set-title { font-family: var(--font-ui); text-transform: uppercase; letter-spacing: .12em;
    font-size: 10px; font-weight: 700; color: var(--ink3); }
  .set-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .set-row.col { flex-direction: column; align-items: stretch; gap: 9px; }
  .set-label { font-family: var(--font-en); font-size: 14px; color: var(--ink); }
  .swatches { display: flex; gap: 8px; }
  .swatch { width: 34px; height: 34px; border-radius: 9px; border: 2px solid transparent; cursor: pointer;
    display: grid; place-items: center; color: #fff; transition: transform .12s; box-shadow: inset 0 0 0 1px rgba(0,0,0,.08); }
  .swatch:hover { transform: scale(1.07); }
  .swatch.on { border-color: var(--ink); }
  .sw-check { font-size: 15px; font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,.3); }
  .segmini { display: flex; background: var(--bg2); border-radius: 8px; padding: 3px; }
  .segmini button { font-family: var(--font-ui); font-size: 12.5px; font-weight: 600; color: var(--ink2);
    background: none; border: none; cursor: pointer; padding: 5px 13px; border-radius: 6px; transition: all .14s; }
  .segmini button.on { background: var(--card); color: var(--ink); box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .switch { width: 42px; height: 24px; border-radius: 999px; border: none; cursor: pointer; padding: 0;
    background: var(--line2); position: relative; transition: background .16s; }
  .switch.on { background: var(--accent); }
  .switch .knob { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%;
    background: #fff; transition: transform .16s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .switch.on .knob { transform: translateX(18px); }
  .tone-1{color:var(--t1)} .tone-2{color:var(--t2)} .tone-3{color:var(--t3)}
  .tone-4{color:var(--t4)} .tone-5{color:var(--t5)}

  /* header */
  .p-head {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 12px; border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .seal {
    width: 30px; height: 30px; border-radius: 7px; background: var(--accent);
    color: #fff; display: grid; place-items: center; font-size: 18px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(200,68,58,.3); font-family: var(--font-han);
  }
  .brand-name { font-family: var(--font-en); font-weight: 700; font-size: 17px; color: var(--ink);
    display: flex; flex-direction: column; line-height: 1.15; white-space: nowrap; }
  .brand-name small { font-family: var(--font-han); font-weight: 400; font-size: 10px; color: var(--ink3); letter-spacing: .12em; margin-top: 1px; }

  .iconbtn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid transparent;
    background: transparent; color: var(--ink2); cursor: pointer;
    display: grid; place-items: center; transition: all .14s;
  }
  .iconbtn:hover { background: var(--card2); color: var(--ink); }
  .iconbtn.on { color: var(--accent); }

  /* search */
  .searchbar {
    flex-shrink: 0; margin: 12px 14px 0; display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--line2); border-radius: 10px; padding: 0 12px;
    transition: border-color .14s, box-shadow .14s;
  }
  .searchbar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search-ic { color: var(--ink3); display: flex; }
  .searchbar input {
    flex: 1; border: none; background: transparent; outline: none;
    padding: 10px 0; font-size: 14.5px; color: var(--ink); font-family: var(--font-ui);
  }
  .searchbar input::placeholder { color: var(--ink3); }
  .clr { border: none; background: none; color: var(--ink3); font-size: 20px; cursor: pointer; line-height: 1; padding: 0 2px; }
  .clr:hover { color: var(--ink); }

  /* tabs */
  .tabs { flex-shrink: 0; display: flex; gap: 4px; padding: 12px 14px 0; }
  .tab {
    font-family: var(--font-ui); font-size: 13px; font-weight: 600; color: var(--ink3);
    background: none; border: none; cursor: pointer; padding: 7px 12px 11px; position: relative;
    border-radius: 8px 8px 0 0; display: flex; align-items: center; gap: 6px;
  }
  .tab:hover { color: var(--ink2); }
  .tab.on { color: var(--accent); }
  .tab.on::after { content: ""; position: absolute; left: 8px; right: 8px; bottom: 0; height: 2.5px;
    background: var(--accent); border-radius: 2px; }
  .tabcount { background: var(--accent-soft); color: var(--accent); font-size: 11px; font-weight: 700;
    border-radius: 999px; padding: 1px 7px; }

  .p-body { flex: 1; overflow-y: auto; border-top: 1px solid var(--line); }
  .p-body::-webkit-scrollbar { width: 9px; }
  .p-body::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 9px; border: 2px solid var(--bg); }

  /* ----- entry ----- */
  .entry { padding: 20px 18px 40px; }
  .backbtn { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-ui);
    font-size: 12.5px; font-weight: 600; color: var(--ink2); background: none; border: none;
    cursor: pointer; padding: 0 0 14px; margin: -2px 0 0; }
  .backbtn:hover { color: var(--accent); }
  .entry-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .hanzi-big { font-size: 60px; font-weight: 700; line-height: 1; color: var(--ink); letter-spacing: 2px; white-space: nowrap; }
  .entry-actions { display: flex; gap: 2px; padding-top: 4px; }

  .pinyin-row { margin-top: 14px; font-weight: 500; }
  .meta-row { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .badge.hsk { font-family: var(--font-ui); font-size: 11px; font-weight: 700; letter-spacing: .03em;
    background: var(--accent-soft); color: var(--accent); border-radius: 6px; padding: 3px 8px; }
  .pos { font-family: var(--font-en); font-style: italic; font-size: 14px; color: var(--ink2); }
  .freq { font-size: 12.5px; color: var(--ink3); }

  .defs { font-family: var(--font-en); margin: 16px 0 4px; padding-left: 22px; }
  .defs li { font-size: 18px; line-height: 1.5; color: var(--ink); margin-bottom: 4px; }
  .defs li::marker { color: var(--accent); font-size: 13px; }

  /* word/char segmented control */
  .seg { display: flex; gap: 4px; background: var(--card2); border-radius: 9px; padding: 3px; margin: 18px 0 6px; }
  .segbtn { flex: 1; font-family: var(--font-ui); font-size: 12.5px; font-weight: 600; color: var(--ink2);
    background: none; border: none; cursor: pointer; padding: 7px; border-radius: 7px; transition: all .14s; }
  .segbtn.on { background: var(--card); color: var(--ink); box-shadow: 0 1px 4px rgba(0,0,0,.08); }

  .charcards { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .charcard { display: flex; align-items: center; gap: 12px; text-align: left;
    background: var(--card); border: 1px solid var(--line); border-radius: 11px; padding: 12px;
    cursor: pointer; transition: all .14s; font-family: var(--font-ui); }
  .charcard:hover { border-color: var(--accent); transform: translateX(2px); }
  .cc-hanzi { font-size: 34px; font-weight: 700; line-height: 1; color: var(--ink); width: 40px; text-align: center; }
  .cc-body { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .cc-gloss { font-family: var(--font-en); font-size: 14.5px; color: var(--ink2); }
  .cc-arrow { color: var(--ink3); font-size: 22px; }

  /* sections */
  .section { margin-top: 26px; }
  .section-label { font-family: var(--font-ui); text-transform: uppercase; letter-spacing: .12em;
    font-size: 10.5px; font-weight: 700; color: var(--ink3); margin-bottom: 12px; }
  .disclosure { display: flex; align-items: center; justify-content: space-between; width: 100%;
    background: none; border: none; padding: 0; cursor: pointer; }
  .disclosure .section-label { margin-bottom: 0; transition: color .14s; }
  .disclosure:hover .section-label, .disclosure:hover .chev { color: var(--accent); }
  .chev { display: flex; color: var(--ink3); transition: transform .2s, color .14s; }
  .chev.open { transform: rotate(90deg); }
  .disclosure + .stroke-wrap { margin-top: 14px; }

  .stroke-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
  .stroke-box { position: relative; width: 150px; height: 150px; background: var(--card);
    border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
  .stroke-grid { position: absolute; inset: 0; }
  .stroke-grid span { position: absolute; background: repeating-linear-gradient(0deg, var(--line2), var(--line2) 2px, transparent 2px, transparent 7px); }
  .stroke-grid span:nth-child(1){ left:50%; top:0; bottom:0; width:1px; transform:translateX(-.5px);
    background: repeating-linear-gradient(180deg,var(--line2),var(--line2) 5px,transparent 5px,transparent 11px); }
  .stroke-grid span:nth-child(2){ top:50%; left:0; right:0; height:1px; transform:translateY(-.5px);
    background: repeating-linear-gradient(90deg,var(--line2),var(--line2) 5px,transparent 5px,transparent 11px); }
  .stroke-grid .d1, .stroke-grid .d2 { top:50%; left:50%; width:212px; height:1px; transform-origin:left center; opacity:.6;
    background: repeating-linear-gradient(90deg,var(--line2),var(--line2) 5px,transparent 5px,transparent 11px); }
  .stroke-grid .d1 { transform: translate(-50%,-50%) rotate(45deg); }
  .stroke-grid .d2 { transform: translate(-50%,-50%) rotate(-45deg); }
  .stroke-svg { position: absolute; inset: 0; display: grid; place-items: center; }
  .stroke-msg { position: absolute; inset: 0; display: grid; place-items: center; font-size: 11px;
    color: var(--ink3); font-family: var(--font-ui); }
  .stroke-msg.ghost { font-family: var(--font-han); font-size: 60px; color: var(--line2); }
  .stroke-msg.ghost small { position: absolute; bottom: 10px; font-family: var(--font-ui); font-size: 10px; color: var(--ink3); }

  .ghostbtn { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-ui);
    font-size: 12.5px; font-weight: 600; color: var(--ink2); background: var(--card);
    border: 1px solid var(--line2); border-radius: 8px; padding: 7px 12px; cursor: pointer; transition: all .14s; }
  .ghostbtn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .ghostbtn:disabled { opacity: .45; cursor: default; }

  .radline { display: flex; align-items: stretch; gap: 12px; flex-wrap: wrap; }
  .radical { display: flex; align-items: center; gap: 9px; background: var(--accent-soft);
    border-radius: 10px; padding: 8px 12px; }
  .rad-char { font-family: var(--font-han); font-size: 26px; color: var(--accent); line-height: 1; }
  .rad-meaning { font-family: var(--font-en); font-size: 13.5px; color: var(--ink2); }
  .comps { display: flex; gap: 7px; flex-wrap: wrap; }
  .comp { display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: var(--card); border: 1px solid var(--line); border-radius: 9px; padding: 8px 11px; min-width: 50px; }
  .comp-char { font-family: var(--font-han); font-size: 22px; color: var(--ink); line-height: 1; }
  .comp-gloss { font-family: var(--font-en); font-size: 11px; color: var(--ink3); white-space: nowrap; }
  .strokes-count { font-family: var(--font-ui); font-size: 12px; color: var(--ink3); margin-top: 10px; }

  .examples { display: flex; flex-direction: column; gap: 14px; }
  .ex { border-left: 2px solid var(--line2); padding-left: 14px; }
  .ex-zh { font-family: var(--font-han); font-size: 19px; color: var(--ink); line-height: 1.5; }
  .ex-py { margin: 3px 0; }
  .ex-en { font-family: var(--font-en); font-size: 14.5px; font-style: italic; color: var(--ink2); }

  /* results */
  .results { padding: 12px 14px 40px; }
  .results-label, .saved-count { font-family: var(--font-ui); text-transform: uppercase; letter-spacing: .1em;
    font-size: 10.5px; font-weight: 700; color: var(--ink3); margin: 4px 4px 10px; }
  .result { width: 100%; display: flex; align-items: center; gap: 12px; text-align: left;
    background: none; border: none; border-radius: 10px; padding: 11px 10px; cursor: pointer; transition: background .12s; }
  .result:hover { background: var(--card); }
  .r-hanzi { font-family: var(--font-han); font-size: 28px; font-weight: 500; color: var(--ink); width: 56px; text-align: center; line-height: 1; }
  .r-body { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .r-top { display: flex; align-items: center; gap: 7px; font-weight: 500; }
  .r-star { color: var(--accent); display: flex; }
  .r-gloss { font-family: var(--font-en); font-size: 14.5px; color: var(--ink2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .r-hsk { font-family: var(--font-ui); font-size: 10.5px; font-weight: 700; color: var(--ink3); }

  /* saved */
  .saved-list { padding: 12px 14px 40px; display: flex; flex-direction: column; gap: 9px; }
  .flash { display: flex; align-items: stretch; background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; overflow: hidden; }
  .flash-main { flex: 1; display: flex; align-items: center; gap: 14px; text-align: left;
    background: none; border: none; padding: 14px; cursor: pointer; transition: background .12s; }
  .flash-main:hover { background: var(--card2); }
  .f-hanzi { font-family: var(--font-han); font-size: 30px; font-weight: 500; color: var(--ink); line-height: 1; }
  .f-body { display: flex; flex-direction: column; gap: 2px; }
  .f-gloss { font-family: var(--font-en); font-size: 14.5px; color: var(--ink2); }
  .f-remove { width: 46px; border: none; border-left: 1px solid var(--line); background: none;
    color: var(--accent); cursor: pointer; display: grid; place-items: center; transition: background .12s; }
  .f-remove:hover { background: var(--accent-soft); }

  /* empty states */
  .empty { padding: 60px 32px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .empty-mark { font-family: var(--font-han); width: 64px; height: 64px; border-radius: 50%;
    border: 2px dashed var(--line2); display: grid; place-items: center; font-size: 30px; color: var(--ink3); margin-bottom: 8px; }
  .empty-title { font-family: var(--font-en); font-size: 18px; font-weight: 600; color: var(--ink); }
  .empty-sub { font-family: var(--font-en); font-size: 14.5px; line-height: 1.55; color: var(--ink2); max-width: 280px; }
</style>
</head>
<body>
