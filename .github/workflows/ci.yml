name: CI

# Run the checks on every PR and on pushes to any branch.
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # pdfjs-dist 6 requires Node >= 22.13 || >= 24
          node-version: '24'
          cache: npm
      - name: Install (clean, from lockfile)
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Build the extension
        run: npm run build
