<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zilense</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body data-theme="light">
    <div class="pop">
      <div class="brand"><img class="seal" src="/icons/icon-48.png" alt="" width="24" height="24" /> Zilense</div>

      <div class="row master">
        <span class="set-label">
          Zilense
          <span class="sub">hover, click &amp; select lookup on pages</span>
        </span>
        <button id="master-toggle" class="switch" role="switch" aria-checked="true">
          <span class="knob"></span>
        </button>
      </div>
      <div class="rule"></div>

      <button id="open-panel" class="action">
        <span class="ic">▤</span>
        <span class="label">Open side panel</span>
      </button>

      <button id="open-window" class="action">
        <span class="ic">◳</span>
        <span class="label">Open in window</span>
      </button>

      <button id="reader-mode" class="action">
        <span class="ic">📖</span>
        <span class="label">Reader mode</span>
      </button>

      <button id="flashcards" class="action">
        <span class="ic">🎴</span>
        <span class="label">Flashcards</span>
      </button>

      <div class="row">
        <span class="set-label">Hover popup</span>
        <button id="hover-toggle" class="switch" role="switch" aria-checked="false">
          <span class="knob"></span>
        </button>
      </div>

      <div class="row">
        <span class="set-label">Pinyin tone colors</span>
        <button id="tone-colors" class="switch" role="switch" aria-checked="false">
          <span class="knob"></span>
        </button>
      </div>

      <div class="row">
        <span class="set-label">
          Disable on this site
          <span id="host" class="sub"></span>
        </span>
        <button id="site-toggle" class="switch" role="switch" aria-checked="false">
          <span class="knob"></span>
        </button>
      </div>

      <!-- the whole subtitle section is shown only on supported video sites
           (YouTube / Coursera); popup.js hides it otherwise -->
      <div id="subs-section" hidden>
      <div class="rule"></div>

      <div class="row">
        <span class="set-label">
          Subtitles (pinyin + lookup)
          <span class="sub">on supported video sites</span>
        </span>
        <button id="subs-toggle" class="switch" role="switch" aria-checked="false">
          <span class="knob"></span>
        </button>
      </div>

      <div class="row" id="subs-dual-row">
        <span class="set-label">
          Dual subtitles
          <span class="sub">Chinese + a second language</span>
        </span>
        <button id="subs-dual" class="switch" role="switch" aria-checked="false">
          <span class="knob"></span>
        </button>
      </div>

      <div class="row" id="subs-lang2-row">
        <span class="set-label">Second language</span>
        <select id="subs-lang2" class="picker" aria-label="Second subtitle language">
          <option value="">English (default)</option>
          <option value="es">Spanish</option>
          <option value="pt">Portuguese</option>
          <option value="fr">French</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="ru">Russian</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ar">Arabic</option>
          <option value="hi">Hindi</option>
          <option value="id">Indonesian</option>
          <option value="vi">Vietnamese</option>
          <option value="tr">Turkish</option>
          <option value="th">Thai</option>
        </select>
      </div>

      <div class="row" id="subs-pinyin-row">
        <span class="set-label">Subtitle pinyin</span>
        <button id="subs-pinyin" class="switch" role="switch" aria-checked="false">
          <span class="knob"></span>
        </button>
      </div>
      </div><!-- /#subs-section -->

      <div class="rule"></div>

      <div class="row">
        <span class="set-label">Highlight HSK ≤</span>
        <select id="hsk-level" class="picker" aria-label="Highlight HSK level">
          <option value="0">Off</option>
          <option value="1">HSK 1</option>
          <option value="2">HSK 2</option>
          <option value="3">HSK 3</option>
          <option value="4">HSK 4</option>
          <option value="5">HSK 5</option>
          <option value="6">HSK 6</option>
          <option value="7">All (7–9)</option>
        </select>
      </div>

      <div class="row">
        <span class="set-label">Color by level</span>
        <button id="hsk-color" class="switch" role="switch" aria-checked="false">
          <span class="knob"></span>
        </button>
      </div>
    </div>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
