<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zilense PDF</title>
  <!-- The shared ::highlight() defaults for the hover token / pin (mydict-tok,
       mydict-pin) so the hover driver paints correctly here too. -->
  <link rel="stylesheet" href="../content/content.css" />
  <!-- Self-hosted Noto Sans/Serif SC (vendored by `npm run fetch:fonts`) so the
       inline popup's Chinese renders consistently offline. -->
  <link rel="stylesheet" href="../sidepanel/fonts.css" />
  <link rel="stylesheet" href="./pdfviewer.css" />
</head>
<body>
  <header id="bar">
    <span id="brand">Zilense PDF</span>
    <span id="status" role="status"></span>
  </header>
  <main id="viewer" aria-label="PDF pages"></main>
  <div id="empty" hidden></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
